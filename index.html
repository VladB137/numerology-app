<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e3a5f">
  <title>Numerology — Complete Reading</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <header id="app-header">
    <div>
      <h1 id="app-title">Numerology</h1>
      <span class="app-subtitle" id="app-subtitle">Complete Reading</span>
    </div>
    <button id="lang-toggle" aria-label="Switch language">EN/RO</button>
  </header>

  <main>
    <section id="input-screen">
      <form id="reading-form" novalidate>
        <div class="field">
          <label for="full-name" id="label-name">Full Name</label>
          <input type="text" id="full-name" required autocomplete="name">
          <small id="name-hint" class="hint"></small>
          <span id="name-error" class="error" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="birthdate" id="label-birthdate">Date of Birth</label>
          <input type="date" id="birthdate" required min="1900-01-01">
          <span id="birthdate-error" class="error" aria-live="polite"></span>
        </div>

        <div class="field">
          <label for="time-of-birth" id="label-time">Time of Birth <span class="optional-tag"></span></label>
          <input type="time" id="time-of-birth">
        </div>

        <div class="field">
          <label for="location" id="label-location">Location of Birth <span class="optional-tag"></span></label>
          <input type="text" id="location" autocomplete="off">
        </div>

        <fieldset id="system-selector">
          <legend id="label-system">System</legend>
          <label><input type="radio" name="system" value="pythagorean" checked> <span>Pythagorean</span></label>
          <label><input type="radio" name="system" value="chaldean"> <span>Chaldean</span></label>
          <label><input type="radio" name="system" value="both"> <span>Both</span></label>
        </fieldset>

        <button type="submit" id="generate-btn" disabled>Generate Reading</button>
      </form>
    </section>

    <section id="results-screen" hidden>
      <div id="results-header">
        <button id="back-btn" aria-label="Back">&larr;</button>
        <div id="person-summary"></div>
      </div>
      <div id="results-container"></div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
